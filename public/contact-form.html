<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Contact Form Registration</title>
  </head>
  <body>
    <!--
      This file exists ONLY so Netlify's build-time scanner can detect and register the contact form.
      It is never shown to users. The actual form is rendered in React at /contact.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="service"></select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
